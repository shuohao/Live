name: Sync and Merge

on:
  schedule:
    - cron: '0 * * * *'  # 每小时运行一次
  workflow_dispatch:  # 允许手动触发

jobs:
  sync-and-merge:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          persist-credentials: false  # 取消自动保存认证
          fetch-depth: 0  # 获取完整的 git 历史记录

      - name: Set up Git
        run: |
          git config --global user.name 'shuohao'
          git config --global user.email 'shuohao@126.com'

      - name: Add upstream repository
        run: |
          git remote add upstream git@github.com:YueChan/Live.git
          git fetch upstream
          git checkout main
          git merge upstream/main

      - name: Merge files
        run: |
          bash merge_files.sh

      - name: Commit and push changes
        run: |
          git add All.m3u
          git commit -m "Merge files into All.m3u"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
